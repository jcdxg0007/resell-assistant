apiVersion: apps/v1
kind: Deployment
metadata:
  name: resell-celery
  namespace: resell-assistant
  labels:
    app: resell-celery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resell-celery
  template:
    metadata:
      labels:
        app: resell-celery
    spec:
      containers:
        - name: celery
          # 与 backend 共用同一份镜像，按 APP_MODE=celery 在 entrypoint.sh 内切模式
          image: crpi-ryxzfb3l96vqk28a.cn-shenzhen.personal.cr.aliyuncs.com/resell-assistant/backend:latest
          env:
            - name: APP_MODE
              value: celery
          envFrom:
            - secretRef:
                name: resell-secret
            - configMapRef:
                name: resell-config
          resources:
            # Playwright 无头 Chromium 抓取吃 CPU+内存：内存给到 3Gi 防 OOM、
            # CPU 给 2 核避免浏览器抢不到 CPU 导致 page.goto 超时。
            # 2026-06-03：线上曾被压到 1Gi/1核 → celery OOMKilled + 闲鱼抓取全超时，
            # 调到下列值后闲鱼采集恢复正常。
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "3Gi"
          volumeMounts:
            - name: playwright-states
              mountPath: /app/playwright_states
            - name: image-storage
              mountPath: /app/storage/images
      volumes:
        - name: playwright-states
          persistentVolumeClaim:
            claimName: playwright-states-pvc
        - name: image-storage
          persistentVolumeClaim:
            claimName: image-storage-pvc
