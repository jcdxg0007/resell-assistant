name: Build & Push & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: crpi-ryxzfb3l96vqk28a.cn-shenzhen.personal.cr.aliyuncs.com
  NAMESPACE: resell-assistant
  KUBE_SERVER: https://bja.sealos.run:6443
  KUBE_NS: ns-3zn44u6p

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/backend:latest
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/backend:${{ github.sha }}

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/frontend:latest
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/frontend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Restart Sealos Deployments
        run: |
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          for APP in backend celery frontend; do
            echo "Restarting $APP..."
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" -X PATCH \
              -H "Authorization: Bearer ${{ secrets.KUBE_TOKEN }}" \
              -H "Content-Type: application/strategic-merge-patch+json" \
              "${{ env.KUBE_SERVER }}/apis/apps/v1/namespaces/${{ env.KUBE_NS }}/deployments/$APP" \
              -d "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"kubectl.kubernetes.io/restartedAt\":\"$NOW\"}}}}}")
            if [ "$STATUS" = "200" ]; then
              echo "✅ $APP restarted successfully"
            else
              echo "❌ $APP restart failed (HTTP $STATUS)"
            fi
          done
