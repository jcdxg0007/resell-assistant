name: Build & Push & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: crpi-ryxzfb3l96vqk28a.cn-shenzhen.personal.cr.aliyuncs.com
  NAMESPACE: resell-assistant
  KUBE_SERVER: https://bja.sealos.run:6443
  KUBE_NS: ns-3zn44u6p

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  build-backend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/backend:latest
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/backend:${{ github.sha }}

  build-frontend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/frontend:latest
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/frontend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: [changes, build-backend, build-frontend]
    if: always() && !failure() && !cancelled()
    steps:
      - name: Deploy to Sealos
        run: |
          SHA="${{ github.sha }}"
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          IMG_BASE="${{ env.REGISTRY }}/${{ env.NAMESPACE }}"

          deploy_app() {
            local APP=$1
            local NEEDS_BUILD=$2
            echo "--- Deploying $APP ---"
            if [ "$NEEDS_BUILD" = "true" ]; then
              echo "Updating image to $IMG_BASE/$APP:$SHA"
              PATCH="{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"kubectl.kubernetes.io/restartedAt\":\"$NOW\"}},\"spec\":{\"containers\":[{\"name\":\"$APP\",\"image\":\"$IMG_BASE/$APP:$SHA\",\"imagePullPolicy\":\"Always\"}]}}}}"
            else
              echo "Restarting only (no new build)"
              PATCH="{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"kubectl.kubernetes.io/restartedAt\":\"$NOW\"}}}}}"
            fi
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" -X PATCH \
              -H "Authorization: Bearer ${{ secrets.KUBE_TOKEN }}" \
              -H "Content-Type: application/strategic-merge-patch+json" \
              "${{ env.KUBE_SERVER }}/apis/apps/v1/namespaces/${{ env.KUBE_NS }}/deployments/$APP" \
              -d "$PATCH")
            if [ "$STATUS" = "200" ]; then
              echo "✅ $APP deployed successfully"
            else
              echo "❌ $APP deploy failed (HTTP $STATUS)"
            fi
          }

          BACKEND_CHANGED="${{ needs.changes.outputs.backend }}"
          FRONTEND_CHANGED="${{ needs.changes.outputs.frontend }}"

          deploy_app "backend"  "$BACKEND_CHANGED"
          deploy_app "celery"   "$BACKEND_CHANGED"
          deploy_app "frontend" "$FRONTEND_CHANGED"
